name: CI

# Validates every push and PR against a disposable Scratch Org: deploy the
# metadata, run Apex tests, then always delete the org — nothing here ever
# touches a persistent org. Requires a `SFDX_AUTH_URL` repo secret pointing
# at a connected Dev Hub (see PORTFOLIO/deployment/README.md step 1) — until
# that secret is set, this workflow will fail at the auth step by design
# rather than silently skip validation.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint LWC/Aura (no-op until any component exists)
        run: npx eslint "**/{aura,lwc}/**/*.js" --no-error-on-unmatched-pattern
      - run: npx prettier --check "force-app/**/*.{cls,trigger,js,xml}" "scripts/apex/*.apex"

  scratch-org-validate:
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate Dev Hub
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > ./SFDX_AUTH_URL.txt
          sf org login sfdx-url --sfdx-url-file ./SFDX_AUTH_URL.txt --alias devhub --set-default-dev-hub
          rm ./SFDX_AUTH_URL.txt

      - name: Create Scratch Org
        run: sf org create scratch --definition-file config/project-scratch-def.json --alias ci-scratch --duration-days 1 --set-default --wait 10

      - name: Deploy metadata
        run: sf project deploy start --target-org ci-scratch --wait 30

      - name: Run Apex tests
        run: sf apex run test --target-org ci-scratch --result-format human --code-coverage --wait 20
        # No Apex classes/triggers exist yet in this metadata-first phase — this
        # step is a no-op until Apex is introduced, and intentionally left in
        # so the pipeline doesn't need editing when that day comes.
        continue-on-error: true

      - name: Delete Scratch Org
        if: always()
        run: sf org delete scratch --target-org ci-scratch --no-prompt
